name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check for package.json and install dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "package.json found, installing dependencies..."
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi
      
      - name: Run build step
        run: |
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            echo "Build script found, running npm run build..."
            npm run build
          else
            echo "No build script found, skipping build step"
          fi
      
      - name: Deploy to Vercel via API
        run: |
          echo "Deploying to Vercel..."
          curl -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "vibin-store",
              "gitSource": {
                "type": "github",
                "repoId": "pierrejosias-sys/vibin-store",
                "ref": "main"
              },
              "projectId": "${{ secrets.VERCEL_PROJECT_ID }}",
              "target": "production"
            }'
      
      - name: Post deployment notification
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
          # Optional: Add Slack/Discord/Email notification here
